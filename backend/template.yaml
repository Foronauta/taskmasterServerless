AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Serverless Task Manager backend

Globals:
  Function:
    Runtime: nodejs18.x
    Timeout: 10
    MemorySize: 256
    Environment:
      Variables:
        TASKS_TABLE: !Ref TasksTable
        SES_FROM_ADDRESS: "no-responder@acrylar.com"  # CAMBIAR después del deploy

Resources:
  TaskApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Cors:
        AllowMethods: "'GET,POST,PUT,OPTIONS'"
        AllowHeaders: "'Content-Type'"
        AllowOrigin: "'*'"
  TasksTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Tasks
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamViewType: NEW_IMAGE

  CreateTaskFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: create_task.handler
      CodeUri: src/
      Runtime: python3.12
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TasksTable
      Environment:
        Variables:
          TABLE_NAME: !Ref TasksTable
      Events:
        CreateTaskApi:
          Type: Api
          Properties:
            Path: /tasks
            Method: post
            RestApiId: !Ref TaskApi

  ListTasksFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: list_tasks.handler
      CodeUri: src/
      Runtime: python3.12
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref TasksTable
      Environment:
        Variables:
          TABLE_NAME: !Ref TasksTable
      Events:
        ListTasksApi:
          Type: Api
          Properties:
            Path: /tasks
            Method: get
            RestApiId: !Ref TaskApi

  UpdateTaskFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: update_task.handler
      CodeUri: src/
      Runtime: python3.12
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TasksTable
      Environment:
        Variables:
          TABLE_NAME: !Ref TasksTable
      Events:
        UpdateTaskApi:
          Type: Api
          Properties:
            Path: /tasks/{id}
            Method: put
            RestApiId: !Ref TaskApi

  GetUploadURLFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: get_upload_url.handler
      CodeUri: src/
      Runtime: python3.12
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - s3:PutObject
              Resource: !Sub "${TaskImagesBucket.Arn}/*"
      Environment:
        Variables:
          IMAGES_BUCKET: !Ref TaskImagesBucket
      Events:
        GetUploadUrlApi:
          Type: Api
          Properties:
            Path: /upload-url
            Method: get
            RestApiId: !Ref TaskApi

  TaskImagesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "appgrafica-images-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        IgnorePublicAcls: false
        BlockPublicPolicy: false
        RestrictPublicBuckets: false
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins:
              - "*"
            AllowedMethods:
              - PUT
              - GET
              - POST
            AllowedHeaders:
              - "*"

  TaskImagesBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref TaskImagesBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: "s3:GetObject"
            Resource: !Sub "${TaskImagesBucket.Arn}/*"

  SendTaskEmailFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: send_task_email.handler
      Runtime: python3.12
      CodeUri: src/
      Timeout: 60
      MemorySize: 512
      Policies:
        - AmazonDynamoDBReadOnlyAccess
        - Statement:
            Effect: Allow
            Action:
              - ses:SendEmail
              - ses:SendRawEmail
            Resource: "*"
      Environment:
        Variables:
          SENDER_EMAIL: "no-responder@acrylar.com"
          RECIPIENT_EMAIL: "natu.brunsteins@gmail.com"
      Events:
        DynamoDBStream:
          Type: DynamoDB
          Properties:
            Stream: !GetAtt TasksTable.StreamArn
            StartingPosition: LATEST


Outputs:
  ApiUrl:
    Description: "API endpoint"
    Value: !Sub "https://${TaskApi}.execute-api.${AWS::Region}.amazonaws.com/Prod"
