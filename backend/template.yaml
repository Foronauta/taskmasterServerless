AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Serverless Task Manager with S3 + CloudFront

Parameters:
  CertificateArn:
    Type: String
    Default: ""
    Description: "ACM Certificate ARN for grafica.acrylar.com (must be in us-east-1 for CloudFront)"
  HostedZoneId:
    Type: String
    Default: ""
    Description: "Route53 HostedZoneId that manages acrylar.com domain"
  DomainName:
    Type: String
    Default: "grafica.acrylar.com"
    Description: "Domain to use for CloudFront distribution"

Conditions:
  HasCertificate: !Not [!Equals [!Ref CertificateArn, ""]]
  HasHostedZone: !Not [!Equals [!Ref HostedZoneId, ""]]

Globals:
  Function:
    Runtime: nodejs18.x
    Timeout: 10
    MemorySize: 256
    Environment:
      Variables:
        TASKS_TABLE: !Ref TasksTable
        SES_FROM_ADDRESS: "no-reply@example.com"  # CAMBIAR después del deploy

Resources:
  TaskApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Cors:
        AllowMethods: "'GET,POST,PUT,OPTIONS'"
        AllowHeaders: "'Content-Type'"
        AllowOrigin: "'*'"
  TasksTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Tasks
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamViewType: NEW_IMAGE

  CreateTaskFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: create_task.handler
      CodeUri: src/
      Runtime: python3.12
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TasksTable
      Environment:
        Variables:
          TABLE_NAME: !Ref TasksTable
      Events:
        CreateTaskApi:
          Type: Api
          Properties:
            Path: /tasks
            Method: post
            RestApiId: !Ref TaskApi

  ListTasksFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: list_tasks.handler
      CodeUri: src/
      Runtime: python3.12
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref TasksTable
      Environment:
        Variables:
          TABLE_NAME: !Ref TasksTable
      Events:
        ListTasksApi:
          Type: Api
          Properties:
            Path: /tasks
            Method: get
            RestApiId: !Ref TaskApi

  UpdateTaskFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: update_task.handler
      CodeUri: src/
      Runtime: python3.12
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TasksTable
      Environment:
        Variables:
          TABLE_NAME: !Ref TasksTable
      Events:
        UpdateTaskApi:
          Type: Api
          Properties:
            Path: /tasks/{id}
            Method: put
            RestApiId: !Ref TaskApi

  GetUploadURLFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: get_upload_url.handler
      CodeUri: src/
      Runtime: python3.12
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - s3:PutObject
              Resource: !Sub "${TaskImagesBucket.Arn}/*"
      Environment:
        Variables:
          IMAGES_BUCKET: !Ref TaskImagesBucket
      Events:
        GetUploadUrlApi:
          Type: Api
          Properties:
            Path: /upload-url
            Method: get
            RestApiId: !Ref TaskApi

  TaskImagesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "appgrafica-images-${AWS::AccountId}"
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins:
              - "*"    # ⚠️ en producción conviene limitar al dominio del frontend
            AllowedMethods:
              - PUT
              - GET
              - POST
            AllowedHeaders:
              - "*"

  SendTaskEmailFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: send_task_email.handler
      Runtime: python3.12
      CodeUri: src/
      Policies:
        - AmazonDynamoDBReadOnlyAccess
        - Statement:
            Effect: Allow
            Action:
              - ses:SendEmail
              - ses:SendRawEmail
            Resource: "*"
      Environment:
        Variables:
          SENDER_EMAIL: "pablofmoli@gmail.com"
          RECIPIENT_EMAIL: "natu.brunsteins@gmail.com"
      Events:
        DynamoDBStream:
          Type: DynamoDB
          Properties:
            Stream: !GetAtt TasksTable.StreamArn
            StartingPosition: LATEST

  # S3 bucket to host the frontend static files
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: appgrafica-acrylar
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true

  # CloudFront Origin Access Identity
  CloudFrontOriginAccessIdentity:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: "OAI for TaskMaster frontend CloudFront distribution"

  # S3 Bucket Policy to allow CloudFront access
  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontGetObject
            Effect: Allow
            Principal:
              CanonicalUser: !GetAtt CloudFrontOriginAccessIdentity.S3CanonicalUserId
            Action: "s3:GetObject"
            Resource: !Sub "${FrontendBucket.Arn}/*"

  # CloudFront Distribution
  WebDistribution:
    Type: AWS::CloudFront::Distribution
    Condition: HasCertificate
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: FrontendS3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: !Sub "origin-access-identity/cloudfront/${CloudFrontOriginAccessIdentity}"
        DefaultCacheBehavior:
          TargetOriginId: FrontendS3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
          Compress: true
        ViewerCertificate:
          AcmCertificateArn: !Ref CertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        Aliases:
          - !Ref DomainName
        PriceClass: PriceClass_100
        CustomErrorResponses:
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html

  # Route53 DNS Record
  FrontendDNSRecord:
    Type: AWS::Route53::RecordSet
    Condition: HasHostedZone
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt WebDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2   # CloudFront Hosted Zone ID (global constant)
        EvaluateTargetHealth: false


Outputs:
  ApiUrl:
    Description: "API endpoint"
    Value: !Sub "https://${TaskApi}.execute-api.${AWS::Region}.amazonaws.com/Prod"
  
  FrontendBucketName:
    Description: "Frontend S3 bucket name"
    Value: !Ref FrontendBucket
  
  CloudFrontDistributionId:
    Description: "CloudFront distribution ID"
    Value: !If [HasCertificate, !Ref WebDistribution, ""]
  
  CloudFrontDomainName:
    Description: "CloudFront distribution domain name"
    Value: !If [HasCertificate, !GetAtt WebDistribution.DomainName, ""]
  
  WebsiteURL:
    Description: "Website URL"
    Value: !If [HasCertificate, !Sub "https://${DomainName}", ""]
